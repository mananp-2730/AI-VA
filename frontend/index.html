<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-VA | CSV Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI-VA</h1>
            <p>Strategic Voice Assistant for Data Analysis</p>
        </header>

        <div class="control-panel">
            <div class="upload-section">
                <label for="csvFileInput" class="custom-file-upload">
                    📂 Upload CSV Dataset
                </label>
                <input type="file" id="csvFileInput" accept=".csv">
                <div id="file-display">No file selected</div>
            </div>

            <div class="mode-section">
                <select id="analysisMode" class="dropdown">
                    <option value="version_a">Version A: Factual Retrieval</option>
                    <option value="version_b">Version B: Strategic Insights</option>
                </select>
            </div>
        </div>

        <div class="voice-section">
            <div class="mic-container">
                <button id="recordButton" class="btn-primary">Tap to Speak</button>
                <button id="clearButton" class="btn-danger">Clear</button>
            </div>
            <p id="statusText" class="status-waiting">Status: Ready</p>
        </div>

        <div class="chat-section">
            <div class="chat-bubble user-bubble">
                <strong>You:</strong>
                <div id="transcriptBox">Your words will appear here...</div>
            </div>
            <div class="chat-bubble ai-bubble">
                <strong>AI-VA:</strong>
                <div id="responseBox">Insights will appear here...</div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
